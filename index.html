<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#18a999">
    <title>Kilometros en Equipo</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=top-trail">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="hero-art" aria-hidden="true">
          <div class="sun"></div>
          <div class="cloud cloud-one"></div>
          <div class="cloud cloud-two"></div>
          <div class="kite"></div>
          <div class="hill hill-back"></div>
          <div class="hill hill-front"></div>
          <div class="road"></div>
          <div class="trail-card">
            <svg class="trail-map" viewBox="0 0 520 180" aria-hidden="true">
              <path class="trail-shadow" d="M30 130 C105 52 180 52 254 105 S395 158 490 42"></path>
              <path class="trail-path" d="M30 118 C104 40 184 43 258 96 S397 147 490 34"></path>
              <path class="trail-center" d="M54 105 C116 55 183 60 250 105 S379 132 463 51"></path>
            </svg>
            <span class="top-runner top-runner-one"></span>
            <span class="top-runner top-runner-two"></span>
            <span class="top-runner top-runner-three"></span>
          </div>
        </div>
        <div class="hero-copy">
          <div class="brand-lockup" aria-label="Kilometros en Equipo">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 84 84" role="img">
                <rect x="5" y="5" width="74" height="74" rx="18"></rect>
                <circle class="mark-dot mark-dot-one" cx="24" cy="25" r="8"></circle>
                <circle class="mark-dot mark-dot-two" cx="61" cy="25" r="8"></circle>
                <path class="mark-route" d="M18 58c9-14 22-21 36-21 8 0 15 3 21 7"></path>
                <path class="mark-ground" d="M14 63h57"></path>
                <path class="mark-leg" d="M30 54l8-14 9 8 9-15"></path>
                <circle class="mark-head" cx="56" cy="32" r="4"></circle>
              </svg>
            </span>
            <span>i run</span>
          </div>
          <h1 id="app-title">Kilometros en Equipo</h1>
          <p>Un mapa alegre para guardar salidas, sumar kilometros y celebrar cada vuelta del equipo.</p>
        </div>
      </section>

      <section class="panel entry-panel" aria-labelledby="form-title">
        <div class="panel-heading">
          <h2 id="form-title">Nueva salida</h2>
          <span id="sync-status" class="status-pill">Conectando...</span>
        </div>

        <form id="run-form" class="run-form">
          <label>
            <span>Fecha</span>
            <input id="date" name="date" type="date" required>
          </label>

          <label>
            <span>Distancia</span>
            <div class="distance-field">
              <input id="distance" name="distance" type="number" min="0.1" step="0.1" inputmode="decimal" placeholder="3.5" required>
              <strong>km</strong>
            </div>
          </label>

          <label>
            <span>Tiempo</span>
            <div class="unit-field">
              <input id="duration" name="duration" type="number" min="1" step="1" inputmode="numeric" placeholder="28" required>
              <strong>min</strong>
            </div>
          </label>

          <fieldset>
            <legend>Circuito</legend>
            <div class="route-options">
              <label class="route-card" aria-label="Circuito montana">
                <input type="radio" name="circuit" value="montana" required>
                <span class="route-icon mountain-icon" aria-hidden="true"></span>
                <strong>Montana</strong>
              </label>
              <label class="route-card" aria-label="Circuito calle">
                <input type="radio" name="circuit" value="calle" required>
                <span class="route-icon street-icon" aria-hidden="true"></span>
                <strong>Calle</strong>
              </label>
            </div>
          </fieldset>

          <label>
            <span>Nota opcional</span>
            <input id="note" name="note" type="text" maxlength="90" placeholder="Ej: con merienda al final">
          </label>

          <div class="form-actions">
            <button id="save-button" class="primary-button" type="submit">
              <span aria-hidden="true">+</span>
              Guardar salida
            </button>
            <button id="cancel-edit" class="secondary-button hidden" type="button">Cancelar edicion</button>
          </div>
        </form>
      </section>

      <section class="stats-grid" aria-label="Resumen">
        <article class="stat-card">
          <span>Total</span>
          <strong id="total-distance">0 km</strong>
        </article>
        <article class="stat-card">
          <span>Salidas</span>
          <strong id="total-runs">0</strong>
        </article>
        <article class="stat-card">
          <span>Favorito</span>
          <strong id="favorite-circuit">-</strong>
        </article>
        <article class="stat-card">
          <span>Ritmo</span>
          <strong id="average-pace">-</strong>
        </article>
      </section>

      <section class="panel log-panel" aria-labelledby="log-title">
        <div class="panel-heading">
          <h2 id="log-title">Bitacora</h2>
          <div class="filter-tabs" role="tablist" aria-label="Filtrar circuito">
            <button type="button" class="filter-tab active" data-filter="todos">Todo</button>
            <button type="button" class="filter-tab" data-filter="montana">Montana</button>
            <button type="button" class="filter-tab" data-filter="calle">Calle</button>
          </div>
        </div>
        <div id="empty-state" class="empty-state">
          <div class="empty-art" aria-hidden="true"></div>
          <p>Todavia no hay salidas. La primera queda con lugar de honor.</p>
        </div>
        <ol id="run-list" class="run-list"></ol>
      </section>
    </main>

    <script src="app.js?v=top-trail" defer></script>
  </body>
</html>
