[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/runs"
  to = "/.netlify/functions/runs"
  status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

